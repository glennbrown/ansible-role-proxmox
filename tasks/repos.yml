---
- name: Disable PVE enterprise repository
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/pve-enterprise.sources
    regexp: '^Enabled:\s+true'
    line: "Enabled: false"
    state: present
  notify: update_apt_cache

- name: Enable PVE no-subscription repository
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: {{ ansible_facts.distribution_release }}
      Components: pve-no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
    dest: /etc/apt/sources.list.d/proxmox.sources
    mode: "0644"
  notify: update_apt_cache

- name: Switch ceph to no-subscription repository
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: https://enterprise.proxmox.com/debian/ceph-squid
      Suites: {{ ansible_facts.distribution_release }}
      Components: enterprise
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
      Enabled: false

      Types: deb
      URIs: http://download.proxmox.com/debian/ceph-squid
      Suites: {{ ansible_facts.distribution_release }}
      Components: no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
    dest: /etc/apt/sources.list.d/ceph.sources
    mode: "0644"
  notify: update_apt_cache

- name: Remove PVE test repository
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/pve-test.sources
    state: absent
  notify: update_apt_cache
  when: not proxmox_enable_pvetest_repo

- name: Enable PVE test repository
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: {{ ansible_facts.distribution_release }}
      Components: pvetest
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
      Enabled: {{ proxmox_enable_pvetest_repo | lower }}
    dest: /etc/apt/sources.list.d/pve-test.sources
    mode: "0644"
  notify: update_apt_cache
  when: proxmox_enable_pvetest_repo

- name: Force update apt cache
  ansible.builtin.meta: flush_handlers
