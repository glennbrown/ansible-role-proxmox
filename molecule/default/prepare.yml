---
- name: Prepare
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Create keyrings directory
      ansible.builtin.file:
        path: /usr/share/keyrings
        state: directory
        mode: '0755'

    - name: Download Proxmox archive keyring
      ansible.builtin.get_url:
        url: https://enterprise.proxmox.com/debian/proxmox-release-bookworm.gpg
        dest: /usr/share/keyrings/proxmox-archive-keyring.gpg
        mode: '0644'

    - name: Create pve-enterprise sources stub
      ansible.builtin.copy:
        content: |
          Types: deb
          URIs: https://enterprise.proxmox.com/debian/pve
          Suites: bookworm
          Components: pve-enterprise
          Enabled: true
          Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
        dest: /etc/apt/sources.list.d/pve-enterprise.sources
        mode: '0644'

    - name: Create proxmox-widget-toolkit directory
      ansible.builtin.file:
        path: /usr/share/javascript/proxmox-widget-toolkit
        state: directory
        mode: '0755'

    - name: Create proxmoxlib.js stub with subscription check
      ansible.builtin.copy:
        content: |
          // Proxmox Widget Toolkit
          Proxmox.Utils.checked_command = function(okFn) {
            Proxmox.Utils.API2Request({
              url: '/nodes/localhost/subscription',
              method: 'GET',
              success: function(response) {
                let data = response.result.data;
                if (data.status !== 'Active') {
                  Ext.Msg.show({
                    title: 'No valid subscription',
                    msg: 'You do not have a valid subscription.',
                    buttons: Ext.Msg.OK,
                    icon: Ext.Msg.WARNING,
                  });
                }
                okFn();
              }
            });
          };
        dest: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
        mode: '0644'

    - name: Create pve-yew-mobile-gui directory
      ansible.builtin.file:
        path: /usr/share/pve-yew-mobile-gui
        state: directory
        mode: '0755'

    - name: Create mobile UI template stub
      ansible.builtin.copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head><title>Proxmox Mobile</title></head>
          <body></body>
          </html>
        dest: /usr/share/pve-yew-mobile-gui/index.html.tpl
        mode: '0644'
